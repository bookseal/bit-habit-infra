apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-web
  template:
    metadata:
      labels:
        app: static-web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: html
            - mountPath: /usr/share/nginx/habit
              name: habit
            - mountPath: /usr/share/nginx/status
              name: status
            - mountPath: /usr/share/nginx/flutter
              name: flutter
            - mountPath: /etc/nginx/conf.d/default.conf
              name: config
              subPath: default.conf
            - mountPath: /etc/nginx/conf.d/.htpasswd
              name: auth
              subPath: .htpasswd
      volumes:
        # workspace로 통합된 경로
        - name: html
          hostPath:
            path: /home/ubuntu/workspace/static-web
            type: Directory
        - name: status
          hostPath:
            path: /home/ubuntu/workspace/status-web
            type: Directory
        # 레거시 habit (수정 금지 - 원본 유지)
        - name: habit
          hostPath:
            path: /var/www/habit
            type: Directory
        # Flutter 빌드 결과물
        - name: flutter
          hostPath:
            path: /home/ubuntu/workspace/bithabit_flutter/build/web
            type: Directory
        - name: config
          configMap:
            name: nginx-conf
        - name: auth
          secret:
            secretName: basic-auth
---
apiVersion: v1
kind: Service
metadata:
  name: static-web-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: static-web
  ports:
    - port: 80
      targetPort: 80
