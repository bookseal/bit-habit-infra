# =============================================================================
# apps/ghost/deployment.yaml  –  Ghost CMS + MySQL on k3s
#
# Two Deployments in one file:
#   1. ghost-mysql  – MySQL 8.0 database used by Ghost
#   2. ghost        – Ghost 5 CMS application (blog.bit-habit.com)
#
# Both use hostPath volumes so data (DB files, blog content) persists on the
# host even if pods are restarted.
#
# Credentials are loaded from a Kubernetes Secret named "ghost-mysql-pass".
# Create that Secret out-of-band:
#   kubectl create secret generic ghost-mysql-pass \
#     --from-literal=password=<MYSQL_PASSWORD> \
#     --from-literal=root-password=<ROOT_PASSWORD>
# =============================================================================

# ---- 1. MySQL database for Ghost ----------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-mysql
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-mysql
  template:
    metadata:
      labels:
        app: ghost-mysql
    spec:
      containers:
        - name: mysql
          image: docker.io/library/mysql:8.0
          imagePullPolicy: Never # Use the locally cached image
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: ghost_prod # Database name Ghost will use
            - name: MYSQL_USER
              value: ghost
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghost-mysql-pass
                  key: password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghost-mysql-pass
                  key: root-password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql # MySQL data directory
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d # SQL files run on first startup
      volumes:
        - name: mysql-data
          hostPath:
            path: /home/ubuntu/workspace/ghost-data/mysql # Persisted on host
            type: DirectoryOrCreate
        - name: init-sql
          hostPath:
            path: /home/ubuntu/workspace/ghost-data/initdb
            type: DirectoryOrCreate
---
# Internal ClusterIP service so the Ghost pod can reach MySQL
apiVersion: v1
kind: Service
metadata:
  name: ghost-mysql-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: ghost-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
# ---- 2. Ghost CMS application -------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost
  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
        - name: ghost
          image: docker.io/library/ghost:5-alpine
          imagePullPolicy: Never # Use the locally cached image
          ports:
            - containerPort: 2368 # Ghost's default HTTP port
          env:
            - name: url
              value: https://blog.bit-habit.com # Public URL Ghost uses for links/redirects
            - name: database__client
              value: mysql
            - name: database__connection__host
              value: ghost-mysql-svc # In-cluster Service name for MySQL
            - name: database__connection__port
              value: "3306"
            - name: database__connection__user
              value: ghost
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: ghost-mysql-pass
                  key: password
            - name: database__connection__database
              value: ghost_prod
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: content
              mountPath: /var/lib/ghost/content # Images, themes, and other Ghost content
      volumes:
        - name: content
          hostPath:
            path: /home/ubuntu/workspace/ghost-data/content # Persisted on host
            type: Directory
---
# Internal ClusterIP service exposed to Traefik via base/ingress.yaml
apiVersion: v1
kind: Service
metadata:
  name: ghost-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: ghost
  ports:
    - port: 80 # Cluster-internal port
      targetPort: 2368 # Ghost's actual listening port
