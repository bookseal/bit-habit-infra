# Traefik IngressRoute for OAuth2 Proxy + Headlamp
# GitHub SSO authentication for k8s.bit-habit.com

---
# IngressRoute: OAuth2 Proxy handles all traffic
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: k8s-dashboard-oauth
  namespace: kubernetes-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    # OAuth2 callback & sign-out paths
    - match: Host(`k8s.bit-habit.com`) && PathPrefix(`/oauth2`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
    # All other traffic goes through OAuth2 Proxy
    - match: Host(`k8s.bit-habit.com`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
  tls:
    secretName: tls-secret
