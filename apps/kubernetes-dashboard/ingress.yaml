# Traefik IngressRoute for Kubernetes Dashboard
# Handles HTTPS backend communication properly

---
# ServersTransport for skipping TLS verification to dashboard
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: dashboard-transport
  namespace: kubernetes-dashboard
spec:
  insecureSkipVerify: true
---
# IngressRoute for k8s.bit-habit.com
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubernetes-dashboard-route
  namespace: kubernetes-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`k8s.bit-habit.com`)
      kind: Rule
      services:
        - name: kubernetes-dashboard
          port: 443
          scheme: https
          serversTransport: dashboard-transport
  tls:
    secretName: tls-secret
